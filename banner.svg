<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <!-- Aurora gradient: violet to teal, horizontal -->
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A07AFF"/>
      <stop offset="100%" stop-color="#00DCB4"/>
    </linearGradient>
    <!-- Ambient violet glow (top-right) -->
    <radialGradient id="glow1" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#A07AFF" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#A07AFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Ambient teal glow (bottom-left) -->
    <radialGradient id="glow2" cx="20%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#00DCB4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00DCB4" stop-opacity="0"/>
    </radialGradient>
    <!-- Aurora gradient for bottom border line -->
    <linearGradient id="border-aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A07AFF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#A07AFF" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#00DCB4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00DCB4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="#06060F"/>

  <!-- Ambient glows -->
  <rect width="900" height="200" fill="url(#glow1)"/>
  <rect width="900" height="200" fill="url(#glow2)"/>

  <!-- Lightning bolt — scaled 1.5x from 32x32 grid, centered at ~(64, 98) -->
  <!-- Original points: 18,2 6,18 14,18 13,30 26,14 18,14 -->
  <!-- Scaled 1.5x + offset (40, 74): -->
  <polygon points="67,77 49,101 61,101 60,119 79,95 67,95" fill="url(#aurora)"/>

  <!-- Name — aurora gradient fill, Georgia serif (Fraunces fallback) -->
  <text
    x="105"
    y="93"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="600"
    fill="url(#aurora)"
    letter-spacing="-0.3">Christen George-McFerrin</text>

  <!-- Title — all caps, tracked, muted -->
  <text
    x="107"
    y="120"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12"
    font-weight="600"
    fill="#EEF0FF"
    opacity="0.55"
    letter-spacing="3">FOUNDER · DEMAND AI STUDIO</text>

  <!-- Tagline -->
  <text
    x="107"
    y="145"
    font-family="Arial, Helvetica, sans-serif"
    font-size="13"
    fill="#EEF0FF"
    opacity="0.4">Building AI automation for modern businesses · Houston, TX</text>

  <!-- Bottom aurora border line -->
  <line x1="0" y1="198" x2="900" y2="198" stroke="url(#border-aurora)" stroke-width="1.5"/>
</svg>
